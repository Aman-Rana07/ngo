<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kind Beings NGO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <header class="ngo-header">
        <div class="ngo-logo">
            <img src="long_logo.png" alt="LOGO">
            <p class="header_links" style="padding:15px"><a href="homepage.html">Home</a></p>
        </div>
    </header>

    <div class="login-wrapper">
        <div class="form-part">
            <h1>Admin Login</h1>
            <form id="adminLogin">
                <div class="input-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="login-btn">LOGIN</button>
            </form>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.href = 'admin_dashboard.html';
        }

        document.getElementById('adminLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin_dashboard.html';
                } else {
                    alert('Login failed: ' + (data.error || 'Invalid credentials'));
                }
            } catch (err) {
                alert('Login error: ' + err.message);
            }
        });
    </script>
</body>
</html>
